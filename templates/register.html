<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Expense Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <h1>💰 Create Account</h1>
    <p class="auth-sub">Start tracking your expenses today.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required/>
      </div>
      <div class="form-group">
        <label>Monthly Budget (₹)</label>
        <input type="number" name="budget" value="5000" min="0" step="100"/>
        <small>You can change this anytime from the Budget page.</small>
      </div>
      <button type="submit" class="btn btn-primary full-width">Create Account</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
</div>
</body>
</html>
