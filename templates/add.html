{% extends "base.html" %}
{% block title %}Add Transaction{% endblock %}
{% block content %}

<div class="page-header">
  <h2>➕ Add Transaction</h2>
  <p>Add a new expense or money received</p>
</div>

<div class="form-card">
  <form method="POST">

    <div class="type-toggle">
      <label class="toggle-option">
        <input type="radio" name="type" value="expense" checked/>
        <span class="toggle-btn red-toggle">💸 Expense</span>
      </label>
      <label class="toggle-option">
        <input type="radio" name="type" value="income"/>
        <span class="toggle-btn green-toggle">💵 Money In</span>
      </label>
    </div>

    <div class="form-group">
      <label>Amount (₹)</label>
      <input type="number" name="amount" placeholder="Enter amount"
             min="1" step="0.01" required/>
    </div>

    <div class="form-group" id="category-group">
      <label>Category</label>
      <select name="category">
        {% for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Date</label>
      <input type="date" name="date"
             value="{{ today }}"
             max="{{ today }}"/>
    </div>

    <div class="form-group">
      <label>Note (optional)</label>
      <input type="text" name="note" placeholder="e.g. Lunch with friends"/>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Transaction</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>

<script>
// Hide category for income
document.querySelectorAll('input[name="type"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('category-group').style.display =
      r.value === 'income' ? 'none' : 'block';
  });
});
// Set today's date
document.querySelector('input[name="date"]').value =
  new Date().toISOString().split('T')[0];
</script>

{% endblock %}
