{% extends "base.html" %}
{% block title %}Edit Transaction{% endblock %}
{% block content %}

<div class="page-header">
  <h2>✏️ Edit Transaction</h2>
</div>

<div class="form-card">
  <form method="POST">

    <div class="type-toggle">
      <label class="toggle-option">
        <input type="radio" name="type" value="expense"
               {{ 'checked' if rec.type=='expense' }}/>
        <span class="toggle-btn red-toggle">💸 Expense</span>
      </label>
      <label class="toggle-option">
        <input type="radio" name="type" value="income"
               {{ 'checked' if rec.type=='income' }}/>
        <span class="toggle-btn green-toggle">💵 Money In</span>
      </label>
    </div>

    <div class="form-group">
      <label>Amount (₹)</label>
      <input type="number" name="amount" value="{{ rec.amount }}"
             min="1" step="0.01" required/>
    </div>

    <div class="form-group" id="category-group"
         style="{{ 'display:none' if rec.type=='income' else '' }}">
      <label>Category</label>
      <select name="category">
        {% for cat in categories %}
          <option value="{{ cat }}" {{ 'selected' if rec.category==cat }}>
            {{ cat }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Date</label>
      <input type="date" name="date" value="{{ rec.date }}" required/>
    </div>

    <div class="form-group">
      <label>Note (optional)</label>
      <input type="text" name="note" value="{{ rec.note or '' }}"
             placeholder="e.g. Lunch with friends"/>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Update</button>
      <a href="{{ url_for('history') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>

<script>
document.querySelectorAll('input[name="type"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('category-group').style.display =
      r.value === 'income' ? 'none' : 'block';
  });
});
</script>

{% endblock %}
